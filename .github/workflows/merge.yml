name: Merge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SCHEME: "Typeform"

jobs:

  CodeAnalysis:
    runs-on: macOS-26
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: CodeQL Initialization
      uses: github/codeql-action/init@v4
      with:
        languages: swift

    - name: Build
      shell: bash
      run: swift build

    - name: CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:swift"
